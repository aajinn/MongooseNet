name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.0.0, v1.2.3

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for Source Link

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore MongooseNet/MongooseNet.csproj

      - name: Build
        run: dotnet build MongooseNet/MongooseNet.csproj -c Release --no-restore

      - name: Pack
        run: >
          dotnet pack MongooseNet/MongooseNet.csproj
          -c Release
          --no-build
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./artifacts

      - name: Push to NuGet
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols
        run: >
          dotnet nuget push ./artifacts/*.snupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
